apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - htpasswd:
        fileData:
          name: htpass-secret
      mappingMethod: claim
      name: lab-htpasswd
      type: HTPasswd
    - ldap:
        attributes:
          email:
            - mail
          id:
            - dn
          name:
            - cn
          preferredUsername:
            - uid
        bindDN: cn=Directory Manager
        bindPassword:
          name: ldap-secret
        insecure: true
        url: 'ldap://ds389.ldap-demo.svc.cluster.local:389/ou=users,dc=acme,dc=com?uid'
      mappingMethod: claim
      name: ldap-demo
      type: LDAP
