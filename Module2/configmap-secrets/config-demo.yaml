apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-demo
  template:
    metadata:
      labels:
        app: config-demo
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/ubi-minimal
          command: ["/bin/bash", "-c", "--"]
          args: ["echo \"mode=$APP_MODE level=$APP_LOG_LEVEL user=$DB_USER\"; sleep 3600"]
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_MODE
            - name: APP_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_LOG_LEVEL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username