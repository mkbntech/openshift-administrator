apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-demo
  template:
    metadata:
      labels:
        app: health-demo
    spec:
      containers:
      - name: web
        image: python:3.11-slim
        command:
        - /bin/sh
        - -c
        - |
          cat > /tmp/server.py <<'EOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import os
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/healthz":
                      if os.path.exists("/tmp/healthy"):
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"OK")
                      else:
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(b"BROKEN")
                  elif self.path == "/ready":
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  else:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"Hello OpenShift")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          EOF
          touch /tmp/healthy
          python /tmp/server.py
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3